<!--Definir o tipo de arquivo que será executado-->
<!DOCTYPE html> 
<!--lang define o idioma da página em resultados de busca-->
<html lang="pt-br">
    

<!-- Head é a área relacionada ao cabeçalho do navegador 
nesta seção será inserido os comandos de meta (propriedades) links de css e javascript -->

<head>
    <!-- Charset define o tipo de caracter que será utilizado na página. 
    no nosso caso, estamos usando o UTF8 que trabalha com acentuação-->
    <meta charset="UTF-8">
    <!-- propriedade de compatibilidade do código html com o navegador
    EDGE da Microsoft -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <!-- propriedade de ajuste de tela para responsividade -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeria aula html</title>
    <link rel="stylesheet" href="css/styles.css">

</head>
<body>
<hr>
<h1>Elementos da página html - Cleverson Martins</h1>
<!-- horizontal rouler -->
<hr>
<p>
    “o Homem, o Meio e a Máquina”
</p>
<img src="img/foto01.jpg" alt="Cabine de aeronave">

</body>
</html>
